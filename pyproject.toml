[project]
name = "logseq-skill"
version = "0.1.0"
description = "Parser, indexer, and writer for Logseq markdown vaults — Claude Code skill foundation."
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7"]

[project.scripts]
logseq = "logseq.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["logseq"]
