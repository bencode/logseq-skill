[project]
name = "logseq-skill"
version = "0.1.0"
description = "Parser, indexer, and writer for Logseq markdown vaults — Claude Code skill foundation."
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7", "pytest-asyncio>=0.21"]
tui = ["textual>=0.86,<1.0", "rich>=13"]

[project.scripts]
logseq = "logseq.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["logseq"]

[tool.pytest.ini_options]
asyncio_mode = "strict"
